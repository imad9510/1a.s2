<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قسم 1 علوم 2</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
}

/* ===== Navbar ===== */
nav {
    background-color: #1e3a5f;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li {
    cursor: pointer;
}

nav ul li:hover {
    color: #ffd166;
}

/* ===== Hero Section ===== */
.hero {
    background: url('https://images.unsplash.com/photo-1581091870627-3d1d6c47d17b') center/cover;
    color: rgb(0, 0, 0);
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 40px;
}

.hero button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    background-color: #ffd166;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}

.hero button:hover {
    background-color: #ffb703;
}

/* ===== Cards Section ===== */
.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 40px;
    flex-wrap: wrap;
}

.card {
    background: rgb(255, 255, 255);
    padding: 25px;
    width: 200px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* ===== Announcements ===== */
.announcements {
    padding: 40px;
    background: white;
    margin: 20px;
    border-radius: 10px;
}

.announcements h2 {
    color: #1e3a5f;
}

/* ===== Contact ===== */
.contact {
    background-color: #1e3a5f;
    color: white;
    padding: 40px;
    text-align: center;
}

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

button.send {
    background-color: #ffd166;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
}

footer {
    text-align: center;
    padding: 15px;
    background: #16283d;
    color: white;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <h2>قسم 1 علوم 2</h2>
    <ul><a href="app.html" style="text-decoration:none; color:inherit;">
        <li>الرئيسية</li>
      </a>
        <a href="b.html" style="text-decoration:none; color:inherit;">
        <li>الجدول الدراسي</li>
      </a>
      <a href="a.html" style="text-decoration:none; color:inherit;">
        <li>التمرينات حول</li>
      </a>
      <a href="c.html" style="text-decoration:none; color:inherit;">
        <li>اخر</li>
      </a>
    </ul>
</nav>

<!-- Hero Section -->
<section class="hero">
    <h1>أهلاً بكم في قسم 1 علوم 2</h1>
    <p>نسعى لتعليم متميز</p>
    <button onclick="showMessage()">المزيد</button>
</section>

<!-- Cards -->
<section class="cards"><a href="a.html" style="text-decoration:none; color:inherit;">
    <div class="card">📚 التمرينات حول</div>
  </a>
  <a href="b.html" style="text-decoration:none; color:inherit;">
    <div class="card">📅 الجدول الدراسي</div>
  </a> 
  <a href="c.html" style="text-decoration:none; color:inherit;">
    <div class="card">📢 اخر</div>
</section>
<!-- Contact -->
<section class="contact">
    <h2>تواصل معنا</h2>
    <input type="text" placeholder="الاسم">
    <input type="email" placeholder="البريد الإلكتروني">
    <textarea rows="4" placeholder="الرسالة"></textarea>
    <br>
    <button class="send" onclick="sendForm()">إرسال</button>
</section>

<footer>
جميع الحقوق محفوظة © التلميذ عماد الدين طويل
</footer>

<script>
function showMessage() {
    alert("مرحباً بك في الموقع الرسمي لقسم 1 علوم 2 💻");
}

function sendForm() {
    alert("تم إرسال رسالتك بنجاح ✅");
}
</script>

</body>
</html>
